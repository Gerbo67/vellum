services:
  vellum:
    build: .
    container_name: vellum
    restart: unless-stopped
    ports:
      - "8025:8025"
      - "2525:2525"
    volumes:
      - vellum_data:/data
    env_file:
      - .env
    healthcheck:
      test: ["CMD", "wget", "-qO-", "http://localhost:8025/api/auth/setup-status"]
      interval: 30s
      timeout: 5s
      retries: 3
      start_period: 10s

volumes:
  vellum_data:
    driver: local
